<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDMAN TRUSTED</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --blue: #007AFF;
            --yellow: #FFD700;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif !important;
            text-transform: uppercase !important;
            font-weight: 900 !important;
        }

        body {
            /* INTEGRATED BACKGROUND.JPG */
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* OVERLAY RIPPLE FOR LIQUID EFFECT */
        .ripple-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: rgba(0,0,0,0.6); overflow: hidden;
        }
        .ripple {
            position: absolute; width: 600px; height: 600px;
            background: rgba(255,255,255,0.05); border-radius: 50%;
            filter: blur(100px); animation: move 10s infinite alternate;
        }
        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(50%, 50%); } }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 35px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        header { text-align: center; padding: 60px 20px; }
        .icon {
            width: 150px; height: 150px; border-radius: 50%;
            object-fit: cover; border: 4px solid rgba(255,255,255,0.2);
            margin-bottom: 20px; box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        h1 { font-size: 2.5rem !important; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .subtitle { opacity: 0.7; margin-bottom: 30px; }

        button {
            padding: 18px 35px; border-radius: 20px;
            border: 1px solid var(--border); background: var(--glass);
            color: white; cursor: pointer; transition: 0.4s;
            text-shadow: 0 0 10px white;
        }
        button:hover { background: white; color: black; box-shadow: 0 0 30px white; }

        #list, #tutorial { max-width: 600px; margin: 60px auto; }
        .card { padding: 30px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .name-container { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.2rem; }
        
        .check-circle { 
            width: 22px; height: 22px; background: var(--blue);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: white; box-shadow: 0 0 15px var(--blue);
        }
        .owner-badge {
            background: var(--yellow); color: black; padding: 2px 10px; 
            border-radius: 8px; font-size: 0.7rem; box-shadow: 0 0 20px var(--yellow);
        }
        
        .btn-wa {
            background: rgba(255,255,255,0.1); color: white; padding: 15px 40px; 
            border-radius: 15px; text-decoration: none; margin-top: 10px;
            border: 1px solid var(--border);
        }
        .btn-wa:hover { background: white; color: black; box-shadow: 0 0 20px white; }

        .tutorial-step { padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); }
        .step-num { font-size: 1.2rem; display: block; margin-bottom: 5px; }

        html { scroll-behavior: smooth; }
    </style>
</head>
